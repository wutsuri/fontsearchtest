<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>波霰（なみあられ）収録文字検索＆一覧</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; color: #333; }
    h1, h2, h3, h4 { text-align: center; }
    
    /* 検索セクションのスタイル */
    .search-section { text-align: center; margin-bottom: 40px; padding: 20px; background: #f0f4f8; border-radius: 8px; }
    textarea { width: 80%; padding: 15px; font-size: 18px; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 20px; resize: vertical; }
    #searchResult { min-height: 80px; text-align: left; padding: 10px 20px; }
    
    /* ステータスとボタン */
    .booth-btn { display: block; width: fit-content; margin: 20px auto 0; padding: 10px 20px; background: #fc4d50; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; text-align: center; }
    .success-msg { background: #e8f5e9; padding: 15px; border-radius: 5px; color: #2e7d32; font-weight: bold; text-align: center; margin-bottom: 15px; }

    /* 一覧リストのスタイル（グリッド） */
    .list-section { margin-top: 40px; }
    .char-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); 
      gap: 5px; 
      margin-bottom: 30px;
    }
    .char-box {
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 10px 0;
      text-align: center;
      font-size: 20px;
      background: #fff;
    }
    /* ステータス別の色分け */
    .planned-box { background: #fff8e1; border-color: #ffe082; color: #795548; }
    .missing-box { background: #ffebee; border-color: #ffcdd2; color: #c62828; }
  </style>
</head>
<body>

  <h1>波霰 収録文字一覧・検索</h1>

  <div class="search-section">
    <p>判定したい文章を入力またはペーストしてください</p>
    <textarea id="searchInput" rows="3" placeholder="例: 波霰フォントのテスト文章です。"></textarea>
    
    <div id="searchResult">
      <p style="color: #666; text-align: center;">ここに判定結果が表示されます</p>
    </div>
  </div>

  <hr style="border: none; border-top: 1px solid #eee; margin: 40px 0;">

  <div class="list-section">
    <h3>全収録文字一覧</h3>
    
    <h4>収録済みの文字</h4>
    <div id="implementedList" class="char-grid"></div>

    <h4>次回アップデートで追加予定の文字</h4>
    <div id="plannedList" class="char-grid"></div>
  </div>

  <script>
    let fontData = [];

    // JSONデータを読み込む
    fetch('data.json')
      .then(response => response.json())
      .then(data => { 
        fontData = data; 
        renderLists(); 
      });

    // ▼▼ 文章判定機能の処理 ▼▼
    const searchInput = document.getElementById('searchInput');
    const searchResult = document.getElementById('searchResult');

    searchInput.addEventListener('input', (e) => {
      const text = e.target.value;
      
      // 入力が空、またはスペースだけの場合は初期表示に戻す
      if (!text.trim()) {
        searchResult.innerHTML = '<p style="color: #666; text-align: center;">ここに判定結果が表示されます</p>';
        return;
      }

      // 入力された文章を1文字ずつに分解し、重複と空白(スペース・改行)を削除する
      const uniqueChars = Array.from(new Set(text)).filter(c => !/\\s/.test(c) && c !== ' ' && c !== '　' && c !== '\\n');

      const implemented = [];
      const planned = [];
      const missing = [];

      // 各文字のステータスを判定して配列に振り分ける
      uniqueChars.forEach(char => {
        const found = fontData.find(item => item.char === char);
        if (found) {
          if (found.status === 'implemented') implemented.push(char);
          else if (found.status === 'planned') planned.push(char);
        } else {
          missing.push(char);
        }
      });

      // 判定結果のHTMLを組み立てる
      let html = '';

      // すべて収録されている場合のお祝いメッセージ
      if (missing.length === 0 && planned.length === 0) {
        html += `<div class="success-msg">✨ 入力された文章の文字は、すべて収録されています！</div>`;
      }

      // 未収録の文字がある場合
      if (missing.length > 0) {
        html += `<h4>❌ 以下の文字は未収録です</h4>`;
        html += `<div class="char-grid">` + missing.map(c => `<div class="char-box missing-box">${c}</div>`).join('') + `</div>`;
        html += `<a href="【ここにBOOTHの商品URLを貼る】" class="booth-btn" target="_blank">BOOTHでこの文字のリクエストをする</a>`;
        html += `<hr style="margin: 30px 0; border: none; border-top: 1px dashed #ccc;">`;
      }

      // 収録済みの文字がある場合
      if (implemented.length > 0) {
        html += `<h4>✅ 収録済みの文字</h4>`;
        html += `<div class="char-grid">` + implemented.map(c => `<div class="char-box">${c}</div>`).join('') + `</div>`;
      }

      // 追加予定の文字がある場合
      if (planned.length > 0) {
        html += `<h4>⏳ 次回追加予定の文字</h4>`;
        html += `<div class="char-grid">` + planned.map(c => `<div class="char-box planned-box">${c}</div>`).join('') + `</div>`;
      }

      searchResult.innerHTML = html;
    });

    // ▼▼ 一覧表示機能の処理 ▼▼
    function renderLists() {
      const implementedContainer = document.getElementById('implementedList');
      const plannedContainer = document.getElementById('plannedList');

      const implementedChars = fontData.filter(item => item.status === 'implemented');
      implementedContainer.innerHTML = implementedChars.map(item => 
        `<div class="char-box">${item.char}</div>`
      ).join('');

      const plannedChars = fontData.filter(item => item.status === 'planned');
      plannedContainer.innerHTML = plannedChars.map(item => 
        `<div class="char-box planned-box">${item.char}</div>`
      ).join('');
    }
  </script>

</body>
</html>
